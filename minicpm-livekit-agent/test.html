<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveKit Voice Agent Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(168, 85, 247, 0.06) 0%, transparent 50%);
            animation: ambientShift 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes ambientShift {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-5%, 3%);
            }
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 24px;
        }

        .card {
            background: rgba(24, 24, 32, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 36px 28px;
            backdrop-filter: blur(40px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #818cf8, #67e8f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: #71717a;
        }

        /* === Audio Levels === */
        .levels-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 24px 0;
        }

        .level-meter {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .level-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #71717a;
            font-weight: 500;
        }

        .level-bar-container {
            width: 48px;
            height: 100px;
            background: rgba(39, 39, 42, 0.4);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(63, 63, 70, 0.3);
        }

        .level-bar-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            border-radius: 0 0 9px 9px;
            transition: height 0.08s linear;
        }

        .level-bar-fill.user {
            background: linear-gradient(to top, #3b82f6, #67e8f9);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
        }

        .level-bar-fill.agent {
            background: linear-gradient(to top, #8b5cf6, #c084fc);
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.3);
        }

        .level-db {
            font-size: 11px;
            font-weight: 600;
            color: #a1a1aa;
            font-variant-numeric: tabular-nums;
            min-width: 36px;
            text-align: center;
        }

        /* === Status indicator === */
        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 16px 0;
            font-size: 13px;
            font-weight: 500;
        }

        .status-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #52525b;
            transition: all 0.3s;
        }

        .status-indicator .dot.connected {
            background: #34d399;
            box-shadow: 0 0 10px rgba(52, 211, 153, 0.4);
        }

        .status-indicator .dot.connecting {
            background: #fbbf24;
            animation: blink 1s infinite;
        }

        .status-indicator .dot.speaking {
            background: #c084fc;
            box-shadow: 0 0 10px rgba(192, 132, 252, 0.4);
            animation: speakPulse 0.6s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        @keyframes speakPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.4);
            }
        }

        /* === Transcript === */
        .transcript-container {
            margin-top: 16px;
        }

        .transcript-header {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #52525b;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .transcript {
            max-height: 200px;
            overflow-y: auto;
            padding: 14px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 12px;
            border: 1px solid rgba(63, 63, 70, 0.2);
            font-size: 13px;
            line-height: 1.7;
        }

        .transcript:empty::after {
            content: 'Waiting for conversation...';
            color: #3f3f46;
            font-style: italic;
        }

        .transcript .msg {
            margin-bottom: 6px;
            padding: 6px 10px;
            border-radius: 8px;
        }

        .transcript .msg.agent {
            color: #d8b4fe;
            background: rgba(139, 92, 246, 0.08);
        }

        .transcript .msg.user {
            color: #93c5fd;
            background: rgba(59, 130, 246, 0.08);
        }

        .transcript .msg.system {
            color: #71717a;
            font-size: 11px;
            background: none;
            padding: 2px 10px;
        }

        .transcript .msg .role-tag {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.6;
            margin-right: 6px;
        }

        .transcript::-webkit-scrollbar {
            width: 4px;
        }

        .transcript::-webkit-scrollbar-thumb {
            background: rgba(113, 113, 122, 0.3);
            border-radius: 4px;
        }

        /* === Form === */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: #a1a1aa;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 9px 12px;
            background: rgba(39, 39, 42, 0.6);
            border: 1px solid rgba(63, 63, 70, 0.5);
            border-radius: 10px;
            color: #e4e4e7;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: rgba(129, 140, 248, 0.5);
        }

        .form-group input::placeholder {
            color: #52525b;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* === Buttons === */
        .btn {
            width: 100%;
            padding: 11px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-connect {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
        }

        .btn-connect:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }

        .btn-connect:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-mute {
            flex: 1;
            background: rgba(63, 63, 70, 0.4);
            color: #a1a1aa;
            border: 1px solid rgba(63, 63, 70, 0.5);
        }

        .btn-mute:hover {
            background: rgba(63, 63, 70, 0.6);
        }

        .btn-mute.muted {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border-color: rgba(245, 158, 11, 0.3);
        }

        .btn-disconnect {
            flex: 1;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-disconnect:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        /* Config toggle */
        .config-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 11px;
            color: #52525b;
            margin-bottom: 14px;
            cursor: pointer;
            user-select: none;
        }

        .config-toggle:hover {
            color: #71717a;
        }

        .config-section {
            display: none;
        }

        .config-section.visible {
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🎙️ Qwen Voice Agent</h1>
                <p>LiveKit + Qwen-Omni Realtime</p>
            </div>

            <!-- Audio Level Meters -->
            <div class="levels-container">
                <div class="level-meter">
                    <div class="level-label">👤 You</div>
                    <div class="level-bar-container">
                        <div class="level-bar-fill user" id="userLevel" style="height: 0%"></div>
                    </div>
                    <div class="level-db" id="userDb">—</div>
                </div>
                <div class="level-meter">
                    <div class="level-label">🤖 Agent</div>
                    <div class="level-bar-container">
                        <div class="level-bar-fill agent" id="agentLevel" style="height: 0%"></div>
                    </div>
                    <div class="level-db" id="agentDb">—</div>
                </div>
            </div>

            <!-- Status -->
            <div class="status-indicator">
                <div class="dot" id="statusDot"></div>
                <span id="statusText">Ready to connect</span>
            </div>

            <!-- Config toggle -->
            <div class="config-toggle" onclick="toggleConfig()">⚙️ Server Settings ▾</div>

            <div class="config-section" id="configSection">
                <div class="form-group">
                    <label>LiveKit Server URL</label>
                    <input type="text" id="serverUrl" value="ws://localhost:7880">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>API Key</label>
                        <input type="text" id="apiKey" value="devkey">
                    </div>
                    <div class="form-group">
                        <label>API Secret</label>
                        <input type="password" id="apiSecret" value="secret">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Room Name</label>
                        <input type="text" id="roomName" value="test-room">
                    </div>
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="userName" value="tester">
                    </div>
                </div>
            </div>

            <!-- Connect / Session -->
            <div id="connectArea">
                <button class="btn btn-connect" id="connectBtn" onclick="connectToRoom()">⚡ Connect & Talk</button>
            </div>
            <div id="sessionArea" style="display:none;">
                <div class="btn-row">
                    <button class="btn btn-mute" id="muteBtn" onclick="toggleMute()">🎤 Mute</button>
                    <button class="btn btn-disconnect" onclick="disconnect()">✕ Disconnect</button>
                </div>
            </div>

            <!-- Transcript -->
            <div class="transcript-container">
                <div class="transcript-header">💬 Conversation</div>
                <div class="transcript" id="transcript"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>

    <script>
        let room = null;
        let isMuted = false;
        let userAnalyser = null;
        let agentAnalyser = null;
        let audioCtx = null;
        let animationId = null;
        let agentSpeaking = false;

        // ---- Status ----
        function setStatus(text, state) {
            document.getElementById('statusText').textContent = text;
            const dot = document.getElementById('statusDot');
            dot.className = 'dot' + (state ? ` ${state}` : '');
        }

        // ---- Transcript ----
        function addTranscript(text, type) {
            const el = document.getElementById('transcript');
            const msg = document.createElement('div');
            msg.className = `msg ${type}`;
            if (type === 'agent') {
                msg.innerHTML = `<span class="role-tag">Agent</span>${text}`;
            } else if (type === 'user') {
                msg.innerHTML = `<span class="role-tag">You</span>${text}`;
            } else {
                msg.textContent = text;
            }
            el.appendChild(msg);
            el.scrollTop = el.scrollHeight;
        }

        function toggleConfig() {
            const s = document.getElementById('configSection');
            s.classList.toggle('visible');
        }

        // ---- Audio Level Metering ----
        function startMetering() {
            if (!audioCtx) audioCtx = new AudioContext();

            animationId = requestAnimationFrame(function loop() {
                // User mic level
                if (userAnalyser) {
                    const data = new Uint8Array(userAnalyser.fftSize);
                    userAnalyser.getByteTimeDomainData(data);
                    const rms = Math.sqrt(data.reduce((s, v) => s + (v - 128) * (v - 128), 0) / data.length);
                    const pct = Math.min(100, (rms / 80) * 100);
                    document.getElementById('userLevel').style.height = pct + '%';
                    document.getElementById('userDb').textContent = pct > 1 ? Math.round(pct) + '%' : '—';
                }

                // Agent audio level
                if (agentAnalyser) {
                    const data = new Uint8Array(agentAnalyser.fftSize);
                    agentAnalyser.getByteTimeDomainData(data);
                    const rms = Math.sqrt(data.reduce((s, v) => s + (v - 128) * (v - 128), 0) / data.length);
                    const pct = Math.min(100, (rms / 80) * 100);
                    document.getElementById('agentLevel').style.height = pct + '%';
                    document.getElementById('agentDb').textContent = pct > 1 ? Math.round(pct) + '%' : '—';

                    // Update speaking state
                    if (pct > 5 && !agentSpeaking) {
                        agentSpeaking = true;
                        setStatus('Agent speaking...', 'speaking');
                    } else if (pct <= 2 && agentSpeaking) {
                        agentSpeaking = false;
                        setStatus('Connected — listening', 'connected');
                    }
                }

                animationId = requestAnimationFrame(loop);
            });
        }

        function stopMetering() {
            if (animationId) cancelAnimationFrame(animationId);
            document.getElementById('userLevel').style.height = '0%';
            document.getElementById('agentLevel').style.height = '0%';
            document.getElementById('userDb').textContent = '—';
            document.getElementById('agentDb').textContent = '—';
        }

        function attachUserMicAnalyser(track) {
            if (!audioCtx) audioCtx = new AudioContext();
            const stream = new MediaStream([track.mediaStreamTrack]);
            const source = audioCtx.createMediaStreamSource(stream);
            userAnalyser = audioCtx.createAnalyser();
            userAnalyser.fftSize = 256;
            source.connect(userAnalyser);
        }

        function attachAgentAudioAnalyser(track) {
            if (!audioCtx) audioCtx = new AudioContext();
            const stream = new MediaStream([track.mediaStreamTrack]);
            const source = audioCtx.createMediaStreamSource(stream);
            agentAnalyser = audioCtx.createAnalyser();
            agentAnalyser.fftSize = 256;
            source.connect(agentAnalyser);
        }

        // ---- JWT Token Generation ----
        function b64url(str) { return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, ''); }

        async function signJwt(payload, secret) {
            const header = { alg: 'HS256', typ: 'JWT' };
            const headerB64 = b64url(JSON.stringify(header));
            const payloadB64 = b64url(JSON.stringify(payload));
            const signingInput = `${headerB64}.${payloadB64}`;
            const encoder = new TextEncoder();
            const key = await crypto.subtle.importKey('raw', encoder.encode(secret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
            const sig = await crypto.subtle.sign('HMAC', key, encoder.encode(signingInput));
            return `${headerB64}.${payloadB64}.${b64url(String.fromCharCode(...new Uint8Array(sig)))}`;
        }

        async function generateToken(apiKey, apiSecret, roomName, identity) {
            const now = Math.floor(Date.now() / 1000);
            return signJwt({
                iss: apiKey, sub: identity, iat: now, nbf: now, exp: now + 3600,
                jti: `${identity}-${now}`,
                video: { roomJoin: true, room: roomName, canPublish: true, canSubscribe: true, canPublishData: true },
                name: identity,
            }, apiSecret);
        }

        async function generateAdminToken(apiKey, apiSecret, roomName) {
            const now = Math.floor(Date.now() / 1000);
            return signJwt({
                iss: apiKey, sub: 'admin', iat: now, nbf: now, exp: now + 3600,
                video: { roomAdmin: true, roomCreate: true, room: roomName },
            }, apiSecret);
        }

        // ---- Dispatch agent to room via LiveKit HTTP API ----
        async function dispatchAgent(serverUrl, apiKey, apiSecret, roomName, agentName) {
            const httpUrl = serverUrl.replace('ws://', 'http://').replace('wss://', 'https://');
            const adminToken = await generateAdminToken(apiKey, apiSecret, roomName);

            // Try CreateAgentDispatch first (LiveKit >= 1.7)
            try {
                let resp = await fetch(`${httpUrl}/twirp/livekit.AgentDispatchService/CreateAgentDispatch`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${adminToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ room: roomName, agent_name: agentName }),
                });
                if (resp.ok) {
                    console.log('Agent dispatched via AgentDispatchService');
                    addTranscript('Agent dispatch requested...', 'system');
                    return true;
                }
            } catch (e) { console.log('AgentDispatchService not available:', e); }

            // Fallback: send a SIP-style dispatch via RoomService
            try {
                let resp = await fetch(`${httpUrl}/twirp/livekit.RoomService/CreateRoom`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${adminToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: roomName,
                        agent: { dispatches: [{ agent_name: agentName }] },
                    }),
                });
                if (resp.ok) {
                    console.log('Agent dispatched via CreateRoom');
                    addTranscript('Agent dispatch requested via room...', 'system');
                    return true;
                }
                const errText = await resp.text();
                console.log('CreateRoom response:', resp.status, errText);
            } catch (e) { console.log('CreateRoom failed:', e); }

            addTranscript('⚠️ Could not auto-dispatch agent. Make sure agent is running.', 'system');
            return false;
        }

        // ---- Connect ----
        async function connectToRoom() {
            const serverUrl = document.getElementById('serverUrl').value;
            const apiKey = document.getElementById('apiKey').value;
            const apiSecret = document.getElementById('apiSecret').value;
            const roomName = document.getElementById('roomName').value;
            const userName = document.getElementById('userName').value;

            const btn = document.getElementById('connectBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ Connecting...';
            setStatus('Connecting...', 'connecting');

            try {
                // Step 1: Dispatch agent to the room first
                setStatus('Dispatching agent...', 'connecting');
                await dispatchAgent(serverUrl, apiKey, apiSecret, roomName, 'qwen-voice-agent');

                // Step 2: Generate user token and connect
                const token = await generateToken(apiKey, apiSecret, roomName, userName);

                room = new LivekitClient.Room({
                    adaptiveStream: true, dynacast: true,
                    audioCaptureDefaults: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
                });

                // --- Room Events ---
                room.on(LivekitClient.RoomEvent.Connected, () => {
                    setStatus('Connected — waiting for agent', 'connected');
                    document.getElementById('connectArea').style.display = 'none';
                    document.getElementById('sessionArea').style.display = 'block';
                    addTranscript('Connected to room. Waiting for agent to join...', 'system');
                });

                room.on(LivekitClient.RoomEvent.Disconnected, () => {
                    setStatus('Disconnected', '');
                    resetUI();
                });

                room.on(LivekitClient.RoomEvent.ParticipantConnected, (p) => {
                    setStatus(`Agent "${p.identity}" joined`, 'connected');
                    addTranscript(`Agent "${p.identity}" joined`, 'system');
                });

                room.on(LivekitClient.RoomEvent.ParticipantDisconnected, (p) => {
                    addTranscript(`"${p.identity}" left`, 'system');
                    agentAnalyser = null;
                });

                // Subscribe to agent audio track
                room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
                    if (track.kind === LivekitClient.Track.Kind.Audio) {
                        const audioEl = track.attach();
                        audioEl.id = `audio-${participant.sid}`;
                        document.body.appendChild(audioEl);
                        addTranscript('Agent audio connected — start speaking!', 'system');
                        attachAgentAudioAnalyser(track);
                    }
                });

                room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track, pub, participant) => {
                    if (track.kind === LivekitClient.Track.Kind.Audio) {
                        const el = document.getElementById(`audio-${participant.sid}`);
                        if (el) el.remove();
                        agentAnalyser = null;
                    }
                });

                // Capture local mic track for metering
                room.on(LivekitClient.RoomEvent.LocalTrackPublished, (pub) => {
                    if (pub.track && pub.track.kind === LivekitClient.Track.Kind.Audio) {
                        attachUserMicAnalyser(pub.track);
                    }
                });

                // --- Transcript from Data Messages ---
                room.on(LivekitClient.RoomEvent.DataReceived, (data, participant) => {
                    try {
                        const text = new TextDecoder().decode(data);
                        const msg = JSON.parse(text);
                        if (msg.text) {
                            const role = (participant && participant.identity !== userName) ? 'agent' : 'user';
                            addTranscript(msg.text, role);
                        } else if (msg.type === 'transcript' && msg.content) {
                            addTranscript(msg.content, msg.role === 'user' ? 'user' : 'agent');
                        }
                    } catch { }
                });

                // --- Transcription Events (livekit-agents built-in) ---
                room.on(LivekitClient.RoomEvent.TranscriptionReceived, (segments, participant) => {
                    if (!segments || segments.length === 0) return;
                    const isAgent = participant && participant.identity !== userName;
                    for (const seg of segments) {
                        if (seg.text && seg.final) {
                            addTranscript(seg.text, isAgent ? 'agent' : 'user');
                        }
                    }
                });

                // Connect & publish mic
                await room.connect(serverUrl, token);
                await room.localParticipant.setMicrophoneEnabled(true);

                // Start audio metering loop
                startMetering();

            } catch (err) {
                console.error('Connection error:', err);
                setStatus(`Error: ${err.message}`, '');
                btn.disabled = false;
                btn.innerHTML = '⚡ Connect & Talk';
            }
        }

        function toggleMute() {
            if (!room) return;
            isMuted = !isMuted;
            room.localParticipant.setMicrophoneEnabled(!isMuted);
            const btn = document.getElementById('muteBtn');
            btn.textContent = isMuted ? '🔇 Unmute' : '🎤 Mute';
            btn.classList.toggle('muted', isMuted);
        }

        async function disconnect() {
            stopMetering();
            if (room) { await room.disconnect(); room = null; }
            userAnalyser = null;
            agentAnalyser = null;
            agentSpeaking = false;
            resetUI();
        }

        function resetUI() {
            document.getElementById('connectArea').style.display = 'block';
            document.getElementById('sessionArea').style.display = 'none';
            const btn = document.getElementById('connectBtn');
            btn.disabled = false;
            btn.innerHTML = '⚡ Connect & Talk';
            isMuted = false;
            document.getElementById('muteBtn').textContent = '🎤 Mute';
            document.getElementById('muteBtn').classList.remove('muted');
            setStatus('Ready to connect', '');
            stopMetering();
        }
    </script>
</body>

</html>
