version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: matrix-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    container_name: matrix-livekit
    command:
      - --config
      - /etc/livekit.yaml
      - --dev
      - --node-ip
      - 127.0.0.1
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    depends_on:
      - redis
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    container_name: matrix-coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49152-49200:49152-49200/udp"
    environment:
      - TURN_SECRET=my-local-turn-secret
      - TURN_REALM=localhost
    command:
      - -n
      - --log-file=stdout
      - --min-port=49152
      - --max-port=49200
      - --use-auth-secret
      - --static-auth-secret=my-local-turn-secret
      - --realm=localhost
    restart: unless-stopped
